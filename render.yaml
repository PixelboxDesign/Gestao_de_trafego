services:
  # Backend Service
  - type: web
    name: gestao-de-trafego
    runtime: node
    region: oregon
    buildCommand: cd backend && npm install
    startCommand: cd backend && node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DB_HOST
        value: 162.240.228.36
      - key: DB_PORT
        value: 3306
      - key: DB_USER
        value: hawktec_alpha_log
      - key: DB_PASSWORD
        value: Alpha@3030
      - key: DB_NAME
        value: hawktec_alpha-ecommerce
      - key: FRONTEND_URL
        value: https://gestao-de-trafego-1.onrender.com

  # Frontend Static Site
  - type: web
    name: gestao-de-trafego-frontend
    runtime: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_API_URL
        value: https://gestao-de-trafego.onrender.com/api
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=31536000, immutable
      - path: /index.html
        name: Cache-Control
        value: no-cache
